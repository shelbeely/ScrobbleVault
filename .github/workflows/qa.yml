name: QA

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa:
    name: Type-check & smoke-test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.x"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: TypeScript type-check
        run: bun run typecheck

      - name: Verify no bare Node.js imports
        run: |
          # Fail if any src file imports from bare "fs", "crypto", "path",
          # "os", "http", or "readline" without the node: prefix.
          if grep -rn --include="*.ts" \
               -E 'from "(fs|crypto|path|os|http|readline)"' src/; then
            echo "❌ Bare Node.js imports found — use Bun-native APIs instead."
            exit 1
          fi
          echo "✅ No bare Node.js imports."

      - name: Smoke-test startup
        run: |
          SCROBBLEDB_PATH=/tmp/ci-test.db timeout 5 bun run src/index.ts --help
