name: Copilot plan request
description: Break a large task into small copilot-ready issues before implementation starts.
title: "[copilot-plan] "
labels:
  - copilot-plan
body:
  - type: markdown
    attributes:
      value: |
        Use this template for large work that should be broken into multiple small issues.

        Each proposed issue should include:
        - clear scope
        - acceptance criteria
        - files likely to be modified

        Prefer multiple focused issues over one large implementation task.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the large task, feature, or initiative that needs to be planned.
      placeholder: Describe the overall task to analyze and break down.
    validations:
      required: true
  - type: textarea
    id: goals
    attributes:
      label: Goals and constraints
      description: Include business goals, technical constraints, deadlines, or explicit non-goals.
      placeholder: List the important goals, constraints, and out-of-scope items.
    validations:
      required: true
  - type: textarea
    id: expected-output
    attributes:
      label: Planning acceptance criteria
      description: Describe what a complete planning result should contain.
      value: |
        - Repository analysis is summarized
        - Work is broken into small, independent issues
        - Every issue includes scope, acceptance criteria, and likely files to change
        - Each issue is small enough for a single PR
    validations:
      required: true
